<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizații Globale</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>
  <div id="signature">Popa Bogdan</div>
  <div id="ui-container">
    <h1>Organizații Globale</h1>
    <p>Selectați o organizație pentru a vedea țările membre pe glob (marcate cu verde).</p>
    <div id="button-group">
      <button data-org="none" class="active">Resetare (Toate)</button>
      <button data-org="schengen">Spațiul Schengen</button>
      <button data-org="eu">Uniunea Europeană (UE)</button>
      <button data-org="coe">Consiliul Europei</button>
      <button data-org="eu_council">Consiliul European</button>
      <button data-org="eea">Spațiul SEE (Spațiul Economic European)</button>
      <button data-org="nato">NATO (Organizația Tratatului Atlanticului de Nord)</button>
      <button data-org="onu">ONU (Organizația Națiunilor Unite)</button>
      <button data-org="osce">OSCE (Organizația pentru Securitate și Cooperare în Europa)</button>
      <button data-org="interpol">INTERPOL</button>
      <button data-org="oms">OMS (Org. Mondială a Sănătății)</button>
    </div>
  </div>
  <div id="globe-container"></div>
  <script src="script.js"></script>
</body>
</html>
